<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        rel="stylesheet">


    <!-- fontawesome link -->

        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- tailwind and daisyUi link  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">


    <title>English Janala</title>

<body>

    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <li> <a href="" class="btn btn-outline btn-primary"><i
                                    class="fa-solid fa-circle-question"></i>FAQ</a></li>

                        <li> <a href="" class="btn btn-outline btn-primary"><i
                                    class="fa-solid fa-book-open"></i>Learn</a>
                        </li>
                        <li> <a href="" class="btn btn-outline btn-primary"><i
                                    class="fa-solid fa-arrow-right-from-bracket"></i>Log Out</a></li>
                    </ul>
                </div>
                <a class="btn btn-ghost text-xl">
                    <span>Engling</span>
                    <img src="./assets/logo.png" alt="">
                    <span class="bangla">জানালা</span>
                </a>
            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1 gap-4">
                    <li> <a href="" class="btn btn-outline btn-primary"><i
                                class="fa-solid fa-circle-question"></i>FAQ</a></li>

                    <li> <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i>Learn</a>
                    </li>
                    <li> <a href="" class="btn btn-outline btn-primary"><i
                                class="fa-solid fa-arrow-right-from-bracket"></i>Log Out</a></li>
                </ul>
            </div>

        </div>
    </header>

    <main class="max-w-[1800px] mx-auto">
        <section
            class="section1 flex flex-col-reverse md:flex-row md:text-left text-center gap-20 items-center justify-around">

            <div class="sec1-text max-w-[700px] p-4">
                <h1 class="text-4xl  mb-7 font-bold"><span class="text-sky-400">Engling</span> is Easy!!</h1>
                <p class="bangla">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে
                    চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>




                <fieldset class="fieldset rounded-box">
                    <!-- <legend class="fieldset-legend">Login</legend> -->


                    <input type="text" class="input" placeholder="Enter Your Name" />


                    <input type="password" class="input" placeholder="...................." />

                    <button class="btn btn-primary mt-4 max-w-[150px]">Get Started</button>
                </fieldset>

            </div>
            <div class=" max-w-[700px]">
                <img src="./assets/hero-student.png" alt="">
            </div>

        </section>


        <section class="section2 text-center">
            <h1 class="text-4xl  mb-7 font-bold"><span class="text-sky-400">Let's</span> Learn Vocabularies</h1>

            <div id="lessons" class="flex flex-wrap mx-auto justify-center max-w-[1000px] text-center">

            </div>
        </section>
    </main>
    <script src="./script.js"></script>
